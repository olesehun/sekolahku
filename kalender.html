<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Pendidikan - SMPN 286 Jakarta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #000080;
            --light-bg: #f4f7f6;
            --text-dark: #333;
            --red-holiday: #e74c3c;
        }

        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg); color: var(--text-dark);
        }

        .container { max-width: 1000px; margin: 50px auto; padding: 20px; }
        
        .header-page { text-align: center; margin-bottom: 40px; }
        .header-page h1 { color: var(--navy); margin-bottom: 10px; }

        /* Struktur Kalender */
        .calendar-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 40px;
        }

        .calendar-month {
            background: var(--navy);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-bottom: 1px solid #eee;
        }

        .day-name {
            background: #eee;
            padding: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }

        .calendar-day {
            padding: 15px;
            height: 100px;
            border-right: 1px solid #eee;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        .calendar-day:nth-child(7n) { border-right: none; }
        .calendar-day.sunday { color: var(--red-holiday); }
        
        .date-num { font-weight: 600; }
        
        /* Event Badge */
        .event {
            font-size: 10px;
            background: #3498db;
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
            margin-top: 5px;
            display: block;
            line-height: 1.2;
        }

        .event.holiday { background: var(--red-holiday); }

        /* Keterangan */
        .legend {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        @media (max-width: 768px) {
            .calendar-day { height: 70px; padding: 5px; font-size: 12px; }
            .event { font-size: 8px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-page">
            <h1>Kalender Pendidikan</h1>
            <p>Tahun Ajaran 2025/2026</p>
        </div>

        <div class="calendar-card">
            <div class="calendar-month">Januari 2026</div>
            <div class="calendar-grid">
                <div class="day-name">Min</div>
                <div class="day-name">Sen</div>
                <div class="day-name">Sel</div>
                <div class="day-name">Rab</div>
                <div class="day-name">Kam</div>
                <div class="day-name">Jum</div>
                <div class="day-name">Sab</div>

                <div class="calendar-day"></div>
                <div class="calendar-day"></div>
                <div class="calendar-day"></div>
                <div class="calendar-day">
                    <span class="date-num">1</span>
                    <span class="event holiday">Tahun Baru</span>
                </div>
                <div class="calendar-day"><span class="date-num">2</span></div>
                <div class="calendar-day"><span class="date-num">3</span></div>
                <div class="calendar-day"><span class="date-num">4</span></div>

                <div class="calendar-day sunday"><span class="date-num">5</span></div>
                <div class="calendar-day">
                    <span class="date-num">6</span>
                    <span class="event">Hari Pertama Masuk</span>
                </div>
                <div class="calendar-day"><span class="date-num">7</span></div>
                <div class="calendar-day"><span class="date-num">8</span></div>
                <div class="calendar-day"><span class="date-num">9</span></div>
                <div class="calendar-day"><span class="date-num">10</span></div>
                <div class="calendar-day"><span class="date-num">11</span></div>

                <div class="calendar-day sunday"><span class="date-num">12</span></div>
                <div class="calendar-day"><span class="date-num">13</span></div>
                <div class="calendar-day"><span class="date-num">14</span></div>
                <div class="calendar-day"><span class="date-num">15</span></div>
                <div class="calendar-day"><span class="date-num">16</span></div>
                <div class="calendar-day"><span class="date-num">17</span></div>
                <div class="calendar-day"><span class="date-num">18</span></div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot" style="background: #3498db;"></div> Kegiatan Sekolah</div>
            <div class="legend-item"><div class="dot" style="background: var(--red-holiday);"></div> Libur Nasional</div>
            <div class="legend-item"><div class="dot" style="background: #2ecc71;"></div> Ujian/Asesmen</div>
        </div>
        
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" style="text-decoration: none; color: var(--navy); font-weight: 600;"><i class="fas fa-arrow-left"></i> Kembali ke Home</a>
        </div>
    </div>

</body>
</html>
