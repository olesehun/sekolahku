<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Flipbook Sekolah</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdf6f9;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.book {
  width: 700px;
  height: 450px;
  display: flex;
  margin-top: 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.page {
  width: 50%;
  padding: 20px;
  background: white;
  border-right: 1px solid #eee;
  overflow: auto;
}

.page:last-child {
  border-right: none;
}

h2 {
  font-family: 'Playfair Display', serif;
  color: #7b8fa1;
}

img {
  width: 100%;
  border-radius: 10px;
}

.controls {
  margin-top: 20px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #7b8fa1;
  color: white;
  cursor: pointer;
}

a {
  display: block;
  margin: 5px 0;
  color: #7b8fa1;
  cursor: pointer;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="book">

<!-- LEFT -->
<div class="page" id="left"></div>

<!-- RIGHT -->
<div class="page" id="right"></div>

</div>

<div class="controls">
  <button onclick="prevPage()">Back</button>
  <button onclick="nextPage()">Next</button>
  <button onclick="goHome()">Home</button>
</div>

<script>
let current = 0;

const pages = [
  [
    `<h2>Nama Sekolah</h2>
     <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1">
     <p>Sekolah unggulan masa depan.</p>`,

    `<h2>Welcome</h2>
     <p>Selamat datang di website sekolah kami.</p>`
  ],

  [
    `<h2>Tentang Sekolah</h2>
     <p><b>Visi:</b> Menjadi terbaik</p>
     <p><b>Misi:</b> Pendidikan berkualitas</p>`,

    `<h2>Daftar Isi</h2>
     <a onclick="goTo(2)">1. Informasi</a>
     <a onclick="goTo(3)">2. Struktur</a>
     <a onclick="goTo(4)">3. Profil</a>
     <a onclick="goTo(5)">4. Kontak</a>`
  ],

  [
    `<h2>Informasi Terbaru</h2>
     <p>Kegiatan sekolah terbaru.</p>`,

    `<h2>Update</h2>
     <p>Event dan pengumuman.</p>`
  ],

  [
    `<h2>Struktur Organisasi</h2>
     <p>Kepala → Guru → Staff</p>`,

    `<h2>Detail</h2>
     <p>Penjelasan struktur.</p>`
  ],

  [
    `<h2>Profil</h2>
     <p>Kepsek: [Nama]</p>
     <p>Guru: [Nama]</p>`,

    `<h2>Karyawan</h2>
     <p>Staff: [Nama]</p>`
  ],

  [
    `<h2>Kontak</h2>
     <p>Email: sekolah@email.com</p>`,

    `<h2>Hubungi Kami</h2>
     <p>Telp: 08xxxx</p>`
  ]
];

function render() {
  document.getElementById("left").innerHTML = pages[current][0];
  document.getElementById("right").innerHTML = pages[current][1];
}

function nextPage() {
  if (current < pages.length - 1) {
    current++;
    render();
  }
}

function prevPage() {
  if (current > 0) {
    current--;
    render();
  }
}

function goHome() {
  current = 0;
  render();
}

function goTo(page) {
  current = page;
  render();
}

render();
</script>

</body>
</html>
