<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Profil Sekolah</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdf6f9;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
  color: #7b8fa1;
}

.page {
  display: flex;
  min-height: 100vh;
  padding: 50px;
  align-items: center;
  gap: 40px;
  border-bottom: 1px solid #eee;
}

.page:nth-child(even) {
  flex-direction: row-reverse;
  background: #fff;
}

.text {
  flex: 1;
}

.image {
  flex: 1;
}

.image img {
  width: 100%;
  border-radius: 20px;
}

.title {
  text-align: center;
  padding: 80px 20px;
}

.title h1 {
  font-size: 48px;
}

</style>
</head>

<body>

<div class="title">
  <h1>Profil Sekolah</h1>
  <p>School Profile Book</p>
</div>

<!-- KEPSEK -->
<section class="page">
  <div class="image">
    <img src="https://via.placeholder.com/400">
  </div>
  <div class="text">
    <h2>Kepala Sekolah</h2>
    <p><b>Nama:</b> [Nama Kepsek]</p>
    <p>Sambutan kepala sekolah. Isi dengan kata-kata formal dan inspiring.</p>
  </div>
</section>

<!-- GURU -->
<section class="page">
  <div class="image">
    <img src="https://via.placeholder.com/400">
  </div>
  <div class="text">
    <h2>Guru</h2>
    <p><b>Nama:</b> [Nama Guru]</p>
    <p>Mata pelajaran: Matematika</p>
  </div>
</section>

<!-- KARYAWAN -->
<section class="page">
  <div class="image">
    <img src="https://via.placeholder.com/400">
  </div>
  <div class="text">
    <h2>Karyawan</h2>
    <p><b>Nama:</b> [Nama]</p>
    <p>Bagian: Administrasi</p>
  </div>
</section>

</body>
</html>
